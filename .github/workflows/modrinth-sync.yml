name: Sync Modrinth Project

on:
#  push:
#    branches: ["main"]
#   paths:
#     - README.md
#      - assets/modrinth/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update project description
        run: |
          jq -n --rawfile body README.md '{body: $body}' \
            | curl -fsS -X PATCH "https://api.modrinth.com/v2/project/${{ vars.MODRINTH_ID }}" \
              -H "Authorization: Bearer ${{ secrets.MODRINTH_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @- \
            && echo "Description updated"

      - name: Upload gallery images
        run: |
          GALLERY=$(curl -sf "https://api.modrinth.com/v2/project/${{ vars.MODRINTH_ID }}" \
            -H "Authorization: Bearer ${{ secrets.MODRINTH_TOKEN }}" \
            | jq '.gallery // []')

          for img in assets/modrinth/*.{png,jpg,jpeg,gif,webp,svg}; do
            [ -f "$img" ] || continue
            TITLE="$(basename "${img%.*}")"
            EXT="${img##*.}"

            if echo "$GALLERY" | jq -e --arg t "$TITLE" 'any(.title == $t)' > /dev/null 2>&1; then
              echo "Skipping $(basename "$img") — already in gallery"
            else
              echo "Uploading $(basename "$img")..."
              case "$EXT" in
                jpg|jpeg) CT="image/jpeg" ;;
                png)      CT="image/png" ;;
                gif)      CT="image/gif" ;;
                webp)     CT="image/webp" ;;
                svg)      CT="image/svg+xml" ;;
              esac
              curl -fsS -X POST "https://api.modrinth.com/v2/project/${{ vars.MODRINTH_ID }}/gallery?ext=${EXT}&featured=false&title=${TITLE}" \
                -H "Authorization: Bearer ${{ secrets.MODRINTH_TOKEN }}" \
                -H "Content-Type: ${CT}" \
                --data-binary "@$img" \
                && echo "Uploaded $(basename "$img")"
            fi
          done
