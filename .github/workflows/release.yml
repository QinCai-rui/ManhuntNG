name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "assets/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0). Leave empty for automatic pre-release.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            LATEST_TAG="$(gh release view --json tagName --jq .tagName 2>/dev/null || echo 'v0.0.0')"
            LATEST_TAG="${LATEST_TAG#v}"
            if [[ "$LATEST_TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              X="${BASH_REMATCH[1]}"
              Y="${BASH_REMATCH[2]}"
              Z=$((10#${BASH_REMATCH[3]} + 1))
            else
              X=0; Y=1; Z=0
            fi
            echo "version=${X}.${Y}.${Z}-SNAPSHOT+${{ github.run_number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog for this version
        if: steps.version.outputs.prerelease == 'false'
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## ${VERSION}$/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > changelog-snippet.md
          if [ ! -s changelog-snippet.md ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No changelog found for version ${VERSION} in CHANGELOG.md"
            exit 1
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo 'changelog<<EOF' >> "$GITHUB_OUTPUT"
            cat changelog-snippet.md >> "$GITHUB_OUTPUT"
            echo 'EOF' >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: mvn -B -ntp -Drevision=${{ steps.version.outputs.version }} package

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.version.outputs.version }}"
          if gh release view "$V" --json tagName > /dev/null 2>&1; then
            echo "Release ${V} already exists — skipping creation"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            F="target/ManhuntNG-${V}.jar"
            if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
              gh release create "$V" "$F" --title "$V" --generate-notes --prerelease
            elif [ -f changelog-snippet.md ]; then
              gh release create "$V" "$F" --title "$V" -F changelog-snippet.md
            else
              gh release create "$V" "$F" --title "$V" --generate-notes
            fi
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Modrinth
        if: steps.version.outputs.prerelease == 'false' && steps.release_notes.outputs.found == 'true'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_ID }}
          version: ${{ steps.version.outputs.version }}
          name: ManhuntNG ${{ steps.version.outputs.version }}
          changelog: ${{ steps.release_notes.outputs.changelog }}
          loaders: '["bukkit", "spigot", "paper", "purpur"]'
          game-versions: '["1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9", "1.21.10", "1.21.11", "26.1", "26.1.1", "26.1.2"]'
          files: target/ManhuntNG-${{ steps.version.outputs.version }}.jar
