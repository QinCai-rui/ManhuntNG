name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build package
        run: ./gradlew :paper:shadowJar :fabric:jar

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(date -u +%y.%m.%d)-dev.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
          gh release create "${VERSION}" \
            paper/build/libs/ManhuntNG-*.jar \
            fabric/build/libs/ManhuntNG-fabric-*.jar \
            --title "${VERSION}" \
            --generate-notes
