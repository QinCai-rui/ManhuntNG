name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stamp build version
        id: version
        shell: bash
        run: |
          DATE="$(date -u +%y.%m.%d)"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${DATE}-dev.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Build version: ${VERSION}"

      - name: Build Paper plugin
        run: ./gradlew :paper:build -Pversion=${{ steps.version.outputs.version }}

      - name: Build Fabric mod
        run: ./gradlew :fabric:build -Pversion=${{ steps.version.outputs.version }}

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${VERSION}" \
            paper/build/libs/ManhuntNG-${VERSION}.jar \
            fabric/build/libs/ManhuntNG-fabric-${VERSION}.jar \
            --title "${VERSION}" \
            --generate-notes
