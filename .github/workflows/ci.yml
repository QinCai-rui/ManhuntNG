name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Stamp build version
        id: version
        shell: bash
        run: |
          DATE="$(date -u +%y.%m.%d)"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          CLEAN_BRANCH="$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${DATE}-${CLEAN_BRANCH}.${SHORT_SHA}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Build version: ${VERSION}"

      - name: Build Paper plugin
        run: ./gradlew :paper:build -Pversion=${{ steps.version.outputs.version }}

      - name: Build Fabric mod
        run: ./gradlew :fabric:build -Pversion=${{ steps.version.outputs.version }}
