# ManhuntNG Configuration
config-version: 4

runner:
  keepInventory: false
  lives: 1

hunters:
  infiniteRespawns: true
  respawnLimit: -1
  keepInventory: false
  keepArmor: false
  keepOffhand: false

tracking:
  enabled: true
  updateTicks: 5
  showDistance: true

headstart:
  duration: 10
  # whether hunters can use their compass during headstart
  compassEnabled: false

preHunt:
  countdown: 5
  hunterCircleRadius: 3.0
  formationSearchRadius: 30

chat:
  # Log chat messages to the server console (when chat is intercepted during a game)
  logToConsole: true

scoreboard:
  enabled: true

actionBar:
  enabled: true

nameTags:
  # Master toggle for role suffixes ([H] for hunters, [R] for runners)
  enabled: true
  # Show the suffix on the floating nametag above each player's head
  overhead: true
  # Show the suffix on the player's tab list entry
  tabList: true
  hunters:
    # MiniMessage format (no deprecated & colour codes)
    suffix: "<red>[H]</red>"
  runners:
    suffix: "<green>[R]</green>"

potionEffects:
  runner:
    - type: HEALTH_BOOST
      level: 1
      # infinite
      duration: -1
      # like beacon
      ambient: true
    - type: ABSORPTION
      level: 2
      duration: -1
      ambient: true
  hunters:
    - type: SPEED
      level: 1
      # 1 minute (60x20=1200 ticks)
      duration: 1200
      ambient: true

# Pause timeout. When the game is paused because an entire team disconnected,
# the OPPOSING team automatically wins after `duration` seconds of being paused.
# The countdown is shown in the pause action bar. Set enabled: false to disable.
pauseTimeout:
  enabled: false
  duration: 120
