# ManhuntNG Configuration
config-version: 1

runner:
  lives: 1

hunters:
  infiniteRespawns: true
  respawnLimit: -1
  keepInventory: false
  keepArmor: false

tracking:
  enabled: true
  updateTicks: 5

preHunt:
  countdown: 5
  hunterCircleRadius: 3.0

scoreboard:
  enabled: true

actionBar:
  enabled: true

potionEffects:
  runner:
    - type: HEALTH_BOOST
      level: 1
      # infinite
      duration: -1
      # like beacon
      ambient: true
    - type: ABSORPTION
      level: 2
      duration: -1
      ambient: true
  hunters:
    - type: SPEED
      level: 1
      duration: 60
      ambient: true
