# ManhuntNG Configuration
config-version: 2

runner:
  keepInventory: false
  lives: 1

hunters:
  infiniteRespawns: true
  respawnLimit: -1
  keepInventory: false
  keepArmor: false
  keepOffhand: false

tracking:
  enabled: true
  updateTicks: 5
  showDistance: true

headstart:
  duration: 10
  # whether hunters can use their compass during headstart
  compassEnabled: false

preHunt:
  countdown: 5
  hunterCircleRadius: 3.0
  formationSearchRadius: 30

scoreboard:
  enabled: true

actionBar:
  enabled: true

potionEffects:
  runner:
    - type: HEALTH_BOOST
      level: 1
      # infinite
      duration: -1
      # like beacon
      ambient: true
    - type: ABSORPTION
      level: 2
      duration: -1
      ambient: true
  hunters:
    - type: SPEED
      level: 1
      # 1 minute (60x20=1200 ticks)
      duration: 1200
      ambient: true
