# ManhuntNG Configuration

world:
  resetAfterMatch: true

runner:
  lives: 1
  keepInventory: false

hunters:
  infiniteRespawns: true
  respawnLimit: -1
  keepInventory: false

tracking:
  enabled: true
  updateTicks: 5

preHunt:
  countdown: 5
  hunterCircleRadius: 3.0

scoreboard:
  enabled: true

actionBar:
  enabled: true

potionEffects:
  runner:
    - type: HEALTH_BOOST
      level: 2
      duration: -1
      ambient: true
    - type: ABSORPTION
      level: 1
      duration: -1
      ambient: true
  hunters:
    - type: SPEED
      level: 1
      duration: -1
      ambient: true
