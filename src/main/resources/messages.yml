# ManhuntNG Messages
config-version: 2

# General
prefix: '<gold>[Manhunt] <reset>'

# Game States
game.starting: '<yellow>Game is starting...'
game.started: '<green>The hunt has begun!'
game.stopped: '<red>Game has been stopped.'
game.runner-wins: '<gold><bold>Runner Wins! The Ender Dragon has been defeated!'
game.hunters-win: '<red><bold>Hunters Win! The Runner has been eliminated!'

# Player Messages
player.joined: '<green>You joined the manhunt lobby!'
player.left: '<yellow>You left the manhunt lobby.'
player.is-runner: '<green>You are now the Runner!'
player.is-hunter: '<green>You are now a Hunter!'
player.not-found: '<red>Player not found!'
player.no-permission: '<red>You don''t have permission!'
player.game-in-progress: '<red>A game is already in progress!'
player.cannot-leave: '<red>Cannot leave during an active game!'
player.cannot-change: '<red>Cannot change roles during an active game!'
player.no-runner: '<red>No runner selected!'
player.no-hunters: '<red>No hunters selected!'
player.respawned: '<yellow>{player} has respawned!'
player.eliminated: '<red>{player} has been eliminated!'

# Countdown
countdown.title: '<yellow>{seconds}'
countdown.subtitle: '<gray>Game starting in...'

# Headstart
headstart.title: '<yellow>Head Start!'
headstart.subtitle: '<gray>Run! Hunters frozen for <red>{duration}<gray> seconds'
headstart.hunter-title: '<red>Frozen!'
headstart.hunter-subtitle: '<gray>Runner has a <red>{duration}<gray> second head start'
headstart.ended: '<red>Hunters are now free! The hunt begins!'

# Pre-Hunt
prehunt.title: '<gold>The Hunt Begins!'
prehunt.subtitle: '<gray>Damage a hunter to start'

# Scoreboard
scoreboard.title: '<gold>Manhunt'
scoreboard.runner: '<red>Runner: '
scoreboard.hunters: '<green>Hunters: '
scoreboard.time: '<yellow>Time: '
scoreboard.dimension: '<aqua>Dimension: '
scoreboard.dragon: '<dark_purple>Dragon: '
scoreboard.dragon-alive: 'Alive'
scoreboard.dragon-dead: 'Dead'

# Action Bar
actionbar.format: '<gold>{phase}'
